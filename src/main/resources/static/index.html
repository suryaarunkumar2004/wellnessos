<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellnessOS | Intelligent Health Diagnostics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Auth View -->
        <main id="auth-view" class="glass-panel active-view">
            <div class="logo-container">
                <div class="logo-orb"></div>
                <h1>WellnessOS</h1>
                <p>Enterprise Health Intelligence</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@domain.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="primary-btn">Secure Login</button>
                <div class="form-feedback" id="login-feedback"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" style="display: none;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-fullname" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="name@domain.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="Must include upper, lower, number, special">
                </div>
                <div class="input-group">
                    <label>Client Tracking Token</label>
                    <input type="text" id="reg-token" required value="ATH-WN-10001" placeholder="ATH-WN-XXXXX">
                </div>
                <div class="input-group">
                    <label>Preferred Role</label>
                    <select id="reg-role">
                        <option value="ROLE_MEMBER">Member</option>
                        <option value="ROLE_COACH">Health Coach</option>
                    </select>
                </div>
                <button type="submit" class="primary-btn">Initialize Profile</button>
                <div class="form-feedback" id="reg-feedback"></div>
            </form>
        </main>

        <!-- Dashboard View -->
        <main id="dashboard-view" class="dashboard-panel" style="display: none;">
            <header class="dash-header glass-panel">
                <div class="header-left">
                    <div class="logo-orb small"></div>
                    <div>
                        <h2 id="welcome-text">WellnessOS Dashboard</h2>
                        <span id="user-display" class="user-role-badge">Role: MEMBER</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="icon-btn" onclick="logout()" title="Logout">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </header>

            <div class="dash-content">
                <!-- Member Area -->
                <section id="member-area" class="content-section" style="display: none;">
                    <div class="section-header">
                        <h3>My Secure Biometric Diagnostics</h3>
                    </div>
                    <div class="cards-grid" id="diagnostics-grid">
                        <!-- Diagnostic cards populated by JS -->
                    </div>
                </section>

                <!-- Coach Area -->
                <section id="coach-area" class="content-section" style="display: none;">
                    <div class="section-header">
                        <h3>Diagnostic Report Controls</h3>
                        <button class="secondary-btn" onclick="toggleReportForm()">+ Generate Diagnostic Report</button>
                    </div>

                    <div id="new-report-form" class="glass-panel form-panel" style="display: none;">
                        <form onsubmit="handleCreateReport(event)">
                            <div class="input-group">
                                <label>Member Email (ID)</label>
                                <input type="email" id="rep-member" required placeholder="member@domain.com">
                            </div>
                            <div class="input-group">
                                <label>Biometric Scores (Comma-separated integers, 1 to 10)</label>
                                <input type="text" id="rep-scores" required placeholder="8, 6, 9, 7, 5">
                            </div>
                            <div class="input-group">
                                <label>Peak Heart Rate Variability (ms)</label>
                                <input type="number" step="0.1" id="rep-peak-hrv" required placeholder="75.2">
                            </div>
                            <div class="input-group">
                                <label>Baseline Heart Rate Variability (ms)</label>
                                <input type="number" step="0.1" id="rep-base-hrv" required placeholder="42.5">
                            </div>
                            <div class="input-group">
                                <label>Systemic Summary Notes</label>
                                <input type="text" id="rep-notes" placeholder="Enter clinical recovery summary notes...">
                            </div>
                            <div class="form-actions">
                                <button type="button" class="text-btn" onclick="toggleReportForm()">Cancel</button>
                                <button type="submit" class="primary-btn">Analyze & Publish</button>
                            </div>
                            <div class="form-feedback" id="report-feedback"></div>
                        </form>
                    </div>

                    <div class="glass-panel" style="margin-top:2rem; padding: 2rem;">
                        <h4 style="margin-bottom: 1rem;">Recent Critical Alerts</h4>
                        <div id="critical-alerts-container">
                            <p style="color:var(--text-muted)">No active burnout alerts detected.</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
