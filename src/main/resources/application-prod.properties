server.port=5000

spring.datasource.url=jdbc:mysql://${ALTHEAL_DB_HOST:://amazonaws.com}:3306/altheal_prod_db?useSSL=true&requireSSL=true
spring.datasource.username=${ALTHEAL_DB_USER}
spring.datasource.password=${ALTHEAL_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

://level.com.altheal.wellnessos=INFO
logging.level.org.springframework.web=WARN
